<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .product-card:hover .action-buttons { opacity: 1; transform: translateY(0); }
        .action-buttons { opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <nav class="s-5ticky top-0 z0 bg-orange-600 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-white p-1 rounded-lg">
                    <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="Storefront"></path>
                        <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Market<span class="font-light text-orange-100">OS</span></h1>
            </div>
            <div class="text-sm font-medium bg-orange-700 px-3 py-1 rounded-full">Admin Portal</div>
        </div>
    </nav>

    <div class="p-6 max-w-6xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900">Inventory Management</h2>
                <p class="text-gray-500">Add, update, or remove products from your catalog.</p>
            </div>
            <div id="stats" class="flex gap-4">
                <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-100">
                    <span class="block text-xs text-gray-400 uppercase font-bold">Total Items</span>
                    <span id="productCount" class="text-xl font-bold text-orange-600">0</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 sticky top-24">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-2 h-6 bg-orange-500 rounded-full"></div>
                        <h2 id="formTitle" class="text-xl font-bold">Add New Product</h2>
                    </div>
                    
                    <form id="productForm" class="space-y-4">
                        <input type="hidden" id="productId">
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Product Name</label>
                            <input type="text" id="name" placeholder="e.g. Fresh Milk" required 
                                   class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Category</label>
                            <select id="category" required class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition appearance-none bg-white">
                                <option value="">Select Category</option>
                                <option value="Beverages">Beverages</option>
                                <option value="Dairy">Dairy</option>
                                <option value="Snacks">Snacks</option>
                                <option value="Produce">Produce</option>
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Price (RWF)</label>
                                <input type="number" id="price" placeholder="0" required class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Stock</label>
                                <input type="number" id="stock" placeholder="0" class="w-full border-gray-200 border p-3 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Product Image</label>
                            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <svg class="w-8 h-8 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                    <p class="text-xs text-gray-500">Click to upload</p>
                                </div>
                                <input type="file" id="image" class="hidden" />
                            </label>
                        </div>
                        
                        <button type="submit" id="submitBtn" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-200 hover:bg-orange-600 hover:-translate-y-1 transition-all duration-200 uppercase tracking-wider text-sm">
                            Save Product
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="loader" class="flex flex-col items-center justify-center py-20 text-gray-400">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mb-4"></div>
                    <p class="italic">Synchronizing with warehouse...</p>
                </div>

                <div id="productCardContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 hidden bg-gray-900 text-white px-8 py-3 rounded-full shadow-2xl z-[100] flex items-center gap-3 transition-all duration-300">
        <span id="toastIcon">✅</span>
        <span id="toastMsg" class="font-medium">Success!</span>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/products';
        const IMAGE_BASE_URL = 'http://localhost:3000/uploads/';
        
        const productForm = document.getElementById('productForm');
        const productCardContainer = document.getElementById('productCardContainer');
        const loader = document.getElementById('loader');

        async function loadProducts() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                loader.classList.add('hidden');
                document.getElementById('productCount').innerText = data.length;
                productCardContainer.innerHTML = '';

                data.forEach(p => {
                    const card = document.createElement('div');
                    card.className = "product-card group relative bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300";

                    card.innerHTML = `
                        <div class="relative h-48 overflow-hidden bg-gray-100">
                            <img src="${IMAGE_BASE_URL + p.image}" 
                                 class="w-full h-full object-cover transition duration-500 group-hover:scale-110"
                                 onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=400';" />
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-orange-600 shadow-sm">
                                ${p.category}
                            </div>
                        </div>

                        <div class="p-5">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="text-lg font-bold text-gray-900 leading-tight">${p.name}</h3>
                                <div class="text-xs font-semibold bg-green-50 text-green-600 px-2 py-1 rounded-md">
                                    Qty: ${p.stock || 0}
                                </div>
                            </div>
                            
                            <div class="mt-4 flex items-center justify-between">
                                <div class="flex flex-col">
                                    <span class="text-[10px] uppercase font-bold text-gray-400">Price</span>
                                    <span class="text-xl font-black text-gray-900">${Number(p.price).toLocaleString()} <span class="text-xs font-normal">RWF</span></span>
                                </div>
                                
                                <div class="action-buttons flex gap-2">
                                    <button onclick="editProduct('${p._id}')"
                                        class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition shadow-sm">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>

                                    <button onclick="deleteProduct('${p._id}')"
                                        class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition shadow-sm">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;

                    productCardContainer.appendChild(card);
                });

            } catch (err) {
                loader.innerText = "⚠️ Connection to API failed.";
            }
        }

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const id = document.getElementById('productId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('stock', document.getElementById('stock').value);
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                await fetch(url, { method, body: formData });
                resetForm();
                await loadProducts();
                showToast(id ? "Product updated!" : "Product added!");
            } catch (err) {
                showToast("Something went wrong", "❌");
            } finally {
                btn.disabled = false;
            }
        });

        async function deleteProduct(id) {
            if (confirm("Permanently delete this item?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadProducts();
                showToast("Deleted successfully", "🗑️");
            }
        }

        async function editProduct(id) {
            const res = await fetch(`${API_URL}/${id}`);
            const p = await res.json();

            document.getElementById('productId').value = p._id;
            document.getElementById('name').value = p.name;
            document.getElementById('category').value = p.category;
            document.getElementById('price').value = p.price;
            document.getElementById('stock').value = p.stock;

            document.getElementById('formTitle').innerText = "Edit Inventory";
            document.getElementById('submitBtn').innerText = "UPDATE PRODUCT";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            productForm.reset();
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').innerText = "Add New Product";
            document.getElementById('submitBtn').innerText = "SAVE PRODUCT";
        }

        function showToast(msg, icon = "✅") {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        loadProducts();
    </script>
</body>
</html>
