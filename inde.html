<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans">

    <nav class="bg-orange-500 text-white p-4">
        <h1 class="text-xl font-bold text-center">Supermarket Admin</h1>
    </nav>

    <div class="p-6 max-w-5xl mx-auto">
        
        <!-- FORM -->
        <div class="border-2 border-orange-500 p-4 rounded-md mb-10">
            <h2 id="formTitle" class="font-bold text-orange-600 mb-4">Add New Product</h2>
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="productId">
                
                <input type="text" id="name" placeholder="Product Name" required class="border p-2 rounded">
                
                <select id="category" required class="border p-2 rounded">
                    <option value="">Select Category</option>
                    <option value="Beverages">Beverages</option>
                    <option value="Dairy">Dairy</option>
                </select>
                
                <input type="number" id="price" placeholder="Price (RWF)" required class="border p-2 rounded">
                <input type="number" id="stock" placeholder="Stock Quantity" class="border p-2 rounded">
                
                <input type="file" id="image" class="border p-1 text-sm">
                
                <button type="submit" id="submitBtn" class="bg-orange-500 text-white font-bold py-2 rounded hover:bg-orange-600">
                    SAVE PRODUCT
                </button>
            </form>
        </div>

        <!-- PRODUCT CARDS -->
        <h2 class="font-bold text-gray-700 mb-4">Current Products</h2>
        <div id="loader" class="p-4 text-center text-gray-400 italic">Connecting to API...</div>

        <div id="productCardContainer" 
             class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 hidden bg-orange-600 text-white px-6 py-2 rounded shadow"></div>


    <script>
        const API_URL = 'http://localhost:3000/products';
        const IMAGE_BASE_URL = 'http://localhost:3000/uploads/';
        
        const productForm = document.getElementById('productForm');
        const productCardContainer = document.getElementById('productCardContainer');
        const loader = document.getElementById('loader');

        // Load Products (SHOW CARDS)
        async function loadProducts() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                loader.classList.add('hidden');
                productCardContainer.innerHTML = '';

                data.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 
                        "border rounded-lg shadow p-4 bg-white transition hover:shadow-lg";

                    card.innerHTML = `
                        <img src="${IMAGE_BASE_URL + p.image}" 
                             class="w-full h-40 object-cover rounded mb-3"
                             onerror="this.src='https://via.placeholder.com/150';" />

                        <h3 class="text-lg font-bold">${p.name}</h3>
                        <p class="text-sm text-gray-500">${p.category}</p>

                        <p class="text-orange-600 font-bold mt-2">${p.price} RWF</p>

                        <div class="mt-3 flex gap-3">
                            <button onclick="editProduct('${p._id}')"
                                class="text-blue-500 underline">Edit</button>

                            <button onclick="deleteProduct('${p._id}')"
                                class="text-red-500 underline">Delete</button>
                        </div>
                    `;

                    productCardContainer.appendChild(card);
                });

            } catch (err) {
                loader.innerText = "Error loading products.";
            }
        }

        // CREATE + UPDATE PRODUCT
        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('stock', document.getElementById('stock').value);
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, { method, body: formData });

            resetForm();
            loadProducts();
            showToast("Success!");
        });

        // DELETE PRODUCT
        async function deleteProduct(id) {
            if (confirm("Delete this product?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadProducts();
                showToast("Deleted.");
            }
        }

        // EDIT PRODUCT
        async function editProduct(id) {
            const res = await fetch(`${API_URL}/${id}`);
            const p = await res.json();

            document.getElementById('productId').value = p._id;
            document.getElementById('name').value = p.name;
            document.getElementById('category').value = p.category;
            document.getElementById('price').value = p.price;
            document.getElementById('stock').value = p.stock;

            document.getElementById('formTitle').innerText = "Edit Product";
            document.getElementById('submitBtn').innerText = "UPDATE";
        }

        // RESET FORM
        function resetForm() {
            productForm.reset();
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').innerText = "Add New Product";
            document.getElementById('submitBtn').innerText = "SAVE PRODUCT";
        }

        // TOAST
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        }

        loadProducts();
    </script>

</body>
</html>
